<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DisplayHarmonics</title>

<style>
  :root {
    --bg: #050506;
    --panel: #111114;
    --border: #2a2a30;
    --text: #f5f5f7;
    --muted: #a1a1aa;
    --accent: #5e6ad2;
    --accent-soft: #272a5c;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    display: grid;
    place-items: center;
  }

  .app {
    display: grid;
    gap: 14px;
  }

  .screen {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: 320px;
    height: 180px;
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: var(--panel);
  }

  .side {
    display: grid;
    place-items: center;
    position: relative;
  }

  .side + .side {
    border-left: 1px solid var(--border);
  }

  .label {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  canvas {
    width: 100px;
    height: 100px;
    image-rendering: pixelated;
    background: black;
    border-radius: 8px;
  }

  .controls {
    width: 320px;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--panel);
    display: grid;
    gap: 12px;
  }

  .row {
    display: grid;
    grid-template-columns: 90px 1fr 54px;
    gap: 10px;
    align-items: center;
    font-size: 12px;
    color: var(--muted);
  }

  input[type="range"] {
    width: 100%;
  }

  button {
    border: 0;
    border-radius: 9px;
    padding: 8px 10px;
    color: white;
    background: var(--accent);
    cursor: pointer;
    font-size: 12px;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .preset-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
  }

  .preset-grid button {
    background: var(--accent-soft);
    padding: 7px 6px;
  }

  .preset-grid button.active {
    background: var(--accent);
  }

  .value {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .note {
    font-size: 11px;
    line-height: 1.45;
    color: var(--muted);
  }
</style>
</head>

<body>

<main class="app">
  <section class="screen">
    <section class="side">
      <div class="label">STATIC</div>
      <canvas id="staticCanvas" width="100" height="100"></canvas>
    </section>

    <section class="side">
      <div class="label">FLASH</div>
      <canvas id="flashCanvas" width="100" height="100"></canvas>
    </section>
  </section>

  <section class="controls">
    <div class="note">
      Estimated display refresh: <strong><span id="refreshText">measuring…</span></strong>
    </div>

    <div class="row">
      <label for="frequency">Frequency</label>
      <input id="frequency" type="range" min="1" max="480" step="1" value="120" />
      <div class="value"><span id="frequencyValue">120</span>Hz</div>
    </div>

    <div class="preset-grid" id="harmonicPresets">
      <button data-mode="relative" data-multiplier="0.25">¼×</button>
      <button data-mode="relative" data-multiplier="0.5">½×</button>
      <button data-mode="relative" data-multiplier="1">1×</button>
      <button data-mode="relative" data-multiplier="2">2×</button>
      <button data-mode="relative" data-multiplier="3">3×</button>
      <button data-mode="relative" data-multiplier="4">4×</button>
      <button data-mode="fixed" data-frequency="120">120</button>
      <button data-mode="fixed" data-frequency="240">240</button>
    </div>

    <div class="preset-grid" id="fixedPresets">
      <button data-mode="fixed" data-frequency="24">24</button>
      <button data-mode="fixed" data-frequency="30">30</button>
      <button data-mode="fixed" data-frequency="60">60</button>
      <button data-mode="fixed" data-frequency="90">90</button>
      <button data-mode="fixed" data-frequency="120">120</button>
      <button data-mode="fixed" data-frequency="144">144</button>
      <button data-mode="fixed" data-frequency="165">165</button>
      <button data-mode="fixed" data-frequency="240">240</button>
    </div>

    <div class="row">
      <label for="depth">Depth</label>
      <input id="depth" type="range" min="0" max="100" step="1" value="18" />
      <div class="value"><span id="depthValue">18</span>%</div>
    </div>

    <div class="row">
      <label for="contrast">Contrast</label>
      <input id="contrast" type="range" min="50" max="200" step="1" value="100" />
      <div class="value"><span id="contrastValue">100</span>%</div>
    </div>

    <div class="row">
      <label for="brightness">Base</label>
      <input id="brightness" type="range" min="20" max="180" step="1" value="100" />
      <div class="value"><span id="brightnessValue">100</span>%</div>
    </div>

    <div class="buttons">
      <button id="toggle">Pause Flash</button>
      <button id="measure">Re-measure Display</button>
      <button id="reset">Reset</button>
    </div>

    <div class="note">
      Harmonic shortcuts lock the flash oscillator to simple ratios of the measured refresh cadence. Browser output is still sampled by the panel refresh rate.
    </div>
  </section>
</main>

<script>
"use strict";

const SIZE = 100;

const state = {
  frequency: 120,
  depth: 0.18,
  contrast: 1.0,
  brightness: 1.0,
  flashing: true,
  estimatedRefresh: 60
};

const staticCanvas = document.getElementById("staticCanvas");
const flashCanvas = document.getElementById("flashCanvas");

const staticCtx = staticCanvas.getContext("2d", { alpha: false });
const flashCtx = flashCanvas.getContext("2d", { alpha: false });

const base = staticCtx.createImageData(SIZE, SIZE);
const adjustedBase = staticCtx.createImageData(SIZE, SIZE);
const flash = flashCtx.createImageData(SIZE, SIZE);

const frequency = document.getElementById("frequency");
const depth = document.getElementById("depth");
const contrast = document.getElementById("contrast");
const brightness = document.getElementById("brightness");

const frequencyValue = document.getElementById("frequencyValue");
const depthValue = document.getElementById("depthValue");
const contrastValue = document.getElementById("contrastValue");
const brightnessValue = document.getElementById("brightnessValue");
const refreshText = document.getElementById("refreshText");

const toggle = document.getElementById("toggle");
const reset = document.getElementById("reset");
const measure = document.getElementById("measure");

function clamp(v) {
  return Math.max(0, Math.min(255, v | 0));
}

function imagePixel(x, y) {
  const nx = x / (SIZE - 1);
  const ny = y / (SIZE - 1);

  const dx = nx - 0.5;
  const dy = ny - 0.5;

  const ring = Math.sin(Math.hypot(dx, dy) * 22);
  const xor = ((x >> 2) ^ (y >> 2)) & 255;

  return [
    clamp(nx * 255 + ring * 20),
    clamp(ny * 255 + ring * 16),
    clamp(xor * 0.85 + 36)
  ];
}

function applyTone(v) {
  const centered = (v - 128) * state.contrast + 128;
  return clamp(centered * state.brightness);
}

function buildBaseImage() {
  let i = 0;

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const [r, g, b] = imagePixel(x, y);
      base.data[i++] = r;
      base.data[i++] = g;
      base.data[i++] = b;
      base.data[i++] = 255;
    }
  }
}

function rebuildAdjustedBase() {
  for (let i = 0; i < base.data.length; i += 4) {
    adjustedBase.data[i] = applyTone(base.data[i]);
    adjustedBase.data[i + 1] = applyTone(base.data[i + 1]);
    adjustedBase.data[i + 2] = applyTone(base.data[i + 2]);
    adjustedBase.data[i + 3] = 255;
  }

  staticCtx.putImageData(adjustedBase, 0, 0);
}

function drawFlash(timeMs) {
  const t = timeMs / 1000;
  const phase = state.flashing ? Math.sin(2 * Math.PI * state.frequency * t) : 0;
  const modulation = 1 + phase * state.depth;

  for (let i = 0; i < adjustedBase.data.length; i += 4) {
    flash.data[i] = clamp(adjustedBase.data[i] * modulation);
    flash.data[i + 1] = clamp(adjustedBase.data[i + 1] * modulation);
    flash.data[i + 2] = clamp(adjustedBase.data[i + 2] * modulation);
    flash.data[i + 3] = 255;
  }

  flashCtx.putImageData(flash, 0, 0);
  requestAnimationFrame(drawFlash);
}

function setFrequency(hz) {
  state.frequency = Math.max(1, Math.min(480, Math.round(hz)));
  frequency.value = state.frequency;
  frequencyValue.textContent = String(state.frequency);
  markActivePreset();
}

function syncControls() {
  frequency.value = state.frequency;
  depth.value = Math.round(state.depth * 100);
  contrast.value = Math.round(state.contrast * 100);
  brightness.value = Math.round(state.brightness * 100);

  frequencyValue.textContent = frequency.value;
  depthValue.textContent = depth.value;
  contrastValue.textContent = contrast.value;
  brightnessValue.textContent = brightness.value;
}

function markActivePreset() {
  const buttons = document.querySelectorAll("button[data-mode]");
  buttons.forEach((button) => {
    let target;

    if (button.dataset.mode === "fixed") {
      target = Number(button.dataset.frequency);
    } else {
      target = state.estimatedRefresh * Number(button.dataset.multiplier);
    }

    button.classList.toggle("active", Math.round(target) === state.frequency);
  });
}

function estimateRefreshRate(sampleCount = 80) {
  refreshText.textContent = "measuring…";

  const times = [];

  function sample(now) {
    times.push(now);

    if (times.length < sampleCount) {
      requestAnimationFrame(sample);
      return;
    }

    const intervals = [];

    for (let i = 1; i < times.length; i++) {
      intervals.push(times[i] - times[i - 1]);
    }

    intervals.sort((a, b) => a - b);

    const trimmed = intervals.slice(
      Math.floor(intervals.length * 0.15),
      Math.ceil(intervals.length * 0.85)
    );

    const avg = trimmed.reduce((sum, v) => sum + v, 0) / trimmed.length;
    const hz = Math.round(1000 / avg);

    state.estimatedRefresh = hz;
    refreshText.textContent = hz + " Hz";
    markActivePreset();
  }

  requestAnimationFrame(sample);
}

document.querySelectorAll("button[data-mode]").forEach((button) => {
  button.addEventListener("click", () => {
    if (button.dataset.mode === "fixed") {
      setFrequency(Number(button.dataset.frequency));
    } else {
      setFrequency(state.estimatedRefresh * Number(button.dataset.multiplier));
    }
  });
});

frequency.addEventListener("input", () => {
  state.frequency = Number(frequency.value);
  frequencyValue.textContent = frequency.value;
  markActivePreset();
});

depth.addEventListener("input", () => {
  state.depth = Number(depth.value) / 100;
  depthValue.textContent = depth.value;
});

contrast.addEventListener("input", () => {
  state.contrast = Number(contrast.value) / 100;
  contrastValue.textContent = contrast.value;
  rebuildAdjustedBase();
});

brightness.addEventListener("input", () => {
  state.brightness = Number(brightness.value) / 100;
  brightnessValue.textContent = brightness.value;
  rebuildAdjustedBase();
});

toggle.addEventListener("click", () => {
  state.flashing = !state.flashing;
  toggle.textContent = state.flashing ? "Pause Flash" : "Resume Flash";
});

measure.addEventListener("click", () => {
  estimateRefreshRate();
});

reset.addEventListener("click", () => {
  state.frequency = 120;
  state.depth = 0.18;
  state.contrast = 1.0;
  state.brightness = 1.0;
  state.flashing = true;
  toggle.textContent = "Pause Flash";
  syncControls();
  rebuildAdjustedBase();
  markActivePreset();
});

buildBaseImage();
syncControls();
rebuildAdjustedBase();
estimateRefreshRate();
requestAnimationFrame(drawFlash);
</script>

</body>
</html>
