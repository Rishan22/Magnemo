<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>4-Panel Display Harmonic Grid</title>

<style>
  :root {
    --bg: #050506;
    --panel: #111114;
    --border: #2a2a30;
    --text: #f5f5f7;
    --muted: #a1a1aa;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    display: grid;
    place-items: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 160px);
    grid-template-rows: repeat(2, 160px);
    gap: 14px;
    padding: 18px;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: var(--panel);
  }

  .panel {
    position: relative;
    display: grid;
    place-items: center;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: #0d0d10;
  }

  .label {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  canvas {
    width: 100px;
    height: 100px;
    border-radius: 8px;
    image-rendering: pixelated;
    background: black;
  }
</style>
</head>

<body>

<main class="grid">
  <section class="panel">
    <div class="label">STATIC</div>
    <canvas id="staticA" width="100" height="100"></canvas>
  </section>

  <section class="panel">
    <div class="label">FLASH 1×</div>
    <canvas id="flashA" width="100" height="100"></canvas>
  </section>

  <section class="panel">
    <div class="label">FLASH 2×</div>
    <canvas id="flashB" width="100" height="100"></canvas>
  </section>

  <section class="panel">
    <div class="label">FLASH 4×</div>
    <canvas id="flashC" width="100" height="100"></canvas>
  </section>
</main>

<script>
"use strict";

const SIZE = 100;

const PANELS = [
  { id: "staticA", frequency: 0, depth: 0 },
  { id: "flashA", frequency: 60, depth: 0.18 },
  { id: "flashB", frequency: 120, depth: 0.18 },
  { id: "flashC", frequency: 240, depth: 0.18 }
];

function clamp(v) {
  return Math.max(0, Math.min(255, v | 0));
}

function imagePixel(x, y) {
  const nx = x / (SIZE - 1);
  const ny = y / (SIZE - 1);

  const dx = nx - 0.5;
  const dy = ny - 0.5;

  const ring = Math.sin(Math.hypot(dx, dy) * 22);
  const xor = ((x >> 2) ^ (y >> 2)) & 255;

  return [
    clamp(nx * 255 + ring * 20),
    clamp(ny * 255 + ring * 16),
    clamp(xor * 0.85 + 36)
  ];
}

function buildBaseFrame(ctx) {
  const frame = ctx.createImageData(SIZE, SIZE);
  let i = 0;

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const [r, g, b] = imagePixel(x, y);

      frame.data[i++] = r;
      frame.data[i++] = g;
      frame.data[i++] = b;
      frame.data[i++] = 255;
    }
  }

  return frame;
}

const renderers = PANELS.map(panel => {
  const canvas = document.getElementById(panel.id);
  const ctx = canvas.getContext("2d", { alpha: false });

  return {
    ...panel,
    ctx,
    base: buildBaseFrame(ctx),
    frame: ctx.createImageData(SIZE, SIZE)
  };
});

function animate(timeMs) {
  const t = timeMs / 1000;

  for (const renderer of renderers) {
    const { ctx, base, frame, frequency, depth } = renderer;

    const phase = frequency === 0
      ? 0
      : Math.sin(2 * Math.PI * frequency * t);

    const brightness = 1 + phase * depth;

    for (let i = 0; i < base.data.length; i += 4) {
      frame.data[i]     = clamp(base.data[i] * brightness);
      frame.data[i + 1] = clamp(base.data[i + 1] * brightness);
      frame.data[i + 2] = clamp(base.data[i + 2] * brightness);
      frame.data[i + 3] = 255;
    }

    ctx.putImageData(frame, 0, 0);
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>

</body>
</html>
